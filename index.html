<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }
        canvas {
            display: block;
            margin: 10px auto;
            border: 1px solid #ccc;
            max-width: 100%;
            background-color: white;
        }
        #controls {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }
        button {
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="controls">
        <span id="page-info">Cargando PDF...</span>
    </div>
    <div id="pdf-container"></div>

    <script>
        const pdfUrl = 'Portfolio 2026.pdf';
        let pdfDoc = null;

        pdfjsLib.getDocument(pdfUrl).promise.then(doc => {
            pdfDoc = doc;
            renderAllPages();
        }).catch(err => {
            document.getElementById('pdf-container').innerHTML = '<p>Error al cargar el PDF</p>';
            console.error(err);
        });

        function renderAllPages() {
            const container = document.getElementById('pdf-container');
            container.innerHTML = '';
            
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                pdfDoc.getPage(pageNum).then(page => {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: window.innerWidth > 768 ? 1.5 : 1 });

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    page.render({ canvasContext: context, viewport: viewport });
                    
                    container.appendChild(canvas);
                });
            }
            
            document.getElementById('page-info').textContent = `PDF cargado: ${pdfDoc.numPages} páginas`;
        }
    </script>
</body>
</html>
