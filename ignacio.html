<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de PDF</title>

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita scroll doble */
        }
        embed {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <embed src="Portfolio 2026.pdf" type="application/pdf">
</body>
</html>
